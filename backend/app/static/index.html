<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Memory</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <div>
      <h1>Open Memory</h1>
      <p data-i18n="subtitle">Local-first AI memory cockpit with automatic time-aware triage</p>
    </div>
    <div class="actions">
      <div class="segmented" aria-label="Language">
        <button id="langEn" type="button">EN</button>
        <button id="langZh" type="button">中文</button>
      </div>
      <button id="summarize" data-i18n="summarize">Summarize Today</button>
      <button id="reflect" data-i18n="reflect">Reflect</button>
    </div>
  </header>

  <main>
    <section class="command">
      <div>
        <span class="eyebrow" data-i18n="capture">Capture</span>
        <textarea id="eventText" data-i18n-placeholder="capturePlaceholder" placeholder="Drop a memory, transcript, idea, decision, or todo..."></textarea>
        <input id="triageLlm" class="inline-input" data-i18n-placeholder="triagePlaceholder" placeholder="Triage LLM, e.g. ollama:qwen2.5 (optional)">
      </div>
      <button id="save" data-i18n="save">Save Memory</button>
    </section>

    <section class="grid">
      <article>
        <h2 data-i18n="inbox">Memory Inbox</h2>
        <div id="inbox" class="list"></div>
      </article>
      <article>
        <h2 data-i18n="timeline">Timeline</h2>
        <div id="events" class="list"></div>
      </article>
      <article>
        <h2 data-i18n="dailySummary">Daily Summary</h2>
        <div id="summaries" class="list"></div>
      </article>
      <article>
        <h2 data-i18n="longTermMemory">Long-Term Memory</h2>
        <div id="memories" class="list"></div>
      </article>
    </section>

    <section class="ask">
      <div>
        <span class="eyebrow" data-i18n="ask">Ask</span>
        <input id="question" data-i18n-placeholder="askPlaceholder" placeholder="Ask your memory...">
      </div>
      <button id="ask" data-i18n="askButton">Ask</button>
      <pre id="answer"></pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
